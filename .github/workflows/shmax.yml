name: shmax

on:
  schedule:
    - cron: '16 */02 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Python script
        # Hata olsa bile ne olduğunu görmek için stderr'i takip eder
        run: python3 shmax.py > shmax.m3u8

      - name: config
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "shmax-bot"

      - name: git add
        run: |
          git add shmax.m3u8 || echo "No file to add"

      - name: commit & push
        run: |
          git pull origin main --rebase
          git commit -m "Show Max link updated" || echo "No changes to commit"
          git push origin main
