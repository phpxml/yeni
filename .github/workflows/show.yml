
name: Ciner Group Update

on:
  schedule:
    - cron: '27 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Run script
        run: python ressources/tur/show.py > ressources/tur/show.m3u8

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add ressources/tur/show.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Ciner Group Channels" && git push)
