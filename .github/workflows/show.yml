name: show

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: config
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "show-bot"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Execute Python script
        run: python3 ressources/tur/show.py > ressources/tur/show.m3u8

      - name: commit & push
        run: |
          git add ressources/tur/show.m3u8
          git commit -m "update show playlist" || exit 0
          git push origin main

